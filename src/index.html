<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="assets/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <title>Presentación Grupo 3 - PPI</title>
  </head>
  <body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
      <div class="container">
        <a class="navbar-brand jersey-font" href="#">GRUPO 3</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav mx-auto">
            <a class="nav-link" href="#integrantes">Integrantes</a>
            <a class="nav-link" href="#que_realizamos">Qué realizamos</a>
            <a class="nav-link" href="#presentacion">Presentación</a>
          </div>
        </div>
      </div>
    </nav>

    <header
      class="hero-section text-center d-flex align-items-center justify-content-center pt-5"
      data-aos="fade-down"
    >
      <div class="glass-card p-5 mt-5">
        <h1 class="display-1 jersey-font main-title">DESARROLLO WEB</h1>
        <p class="txt jersey-font fs-2">Explorando el ecosistema digital</p>
      </div>
    </header>

    <main class="container my-5">
      <section id="integrantes" class="mb-5 pt-5">
        <h2 class="h2 text-center mb-4 jersey-font">Integrantes</h2>
        <div class="row justify-content-center">
          <div class="col-md-6 glass-card p-4 text-center" data-aos="fade-up">
            <ul class="list-unstyled mb-0">
              <li class="txt jersey-font fs-1">VILLEGAS ELIAS</li>
              <li class="txt jersey-font fs-1">QUEZADA YESICA</li>
              <li class="txt jersey-font fs-1">ROMERO ISAIAS</li>
              <li class="txt jersey-font fs-1">IBAÑEZ MARIO</li>
            </ul>
          </div>
        </div>
      </section>

      <section id="que_realizamos" class="mb-5 pt-5">
        <h2 class="h2 text-center mb-4 jersey-font">Qué realizamos</h2>
        <div class="row g-4">
          <div class="col-12 col-md-6" data-aos="fade-right">
            <img
              src="assets/monday/captura_1.png"
              class="img-fluid rounded-4 shadow-lg slide-in"
              alt="Paso 1"
            />
          </div>
          <div class="col-12 col-md-6" data-aos="fade-left">
            <img
              src="assets/monday/captura_2.png"
              class="img-fluid rounded-4 shadow-lg slide-in"
              alt="Paso 2"
            />
          </div>
          <div class="col-12 col-md-6" data-aos="fade-right">
            <img
              src="assets/monday/captura_3.png"
              class="img-fluid rounded-4 shadow-lg slide-in"
              alt="Paso 3"
            />
          </div>
          <div class="col-12 col-md-6" data-aos="fade-left">
            <img
              src="assets/monday/captura_4.png"
              class="img-fluid rounded-4 shadow-lg slide-in"
              alt="Paso 4"
            />
          </div>
        </div>
      </section>

      <section id="presentacion" class="mb-5 pt-5 text-center">
        <h2 class="h2 mb-5 jersey-font">Presentación</h2>
        <div class="presentation-grid">
          <div data-aos="fade-up-right">
            <img
              src="assets/diapositivas/diapo_01.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="fade-down-left">
            <img
              src="assets/diapositivas/diapo_02.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="fade-down-right">
            <img
              src="assets/diapositivas/diapo_03.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="fade-down-left">
            <img
              src="assets/diapositivas/diapo_04.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="fade-up-right">
            <img
              src="assets/diapositivas/diapo_05.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="flip-up">
            <img
              src="assets/diapositivas/diapo_06.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="flip-up">
            <img
              src="assets/diapositivas/diapo_07.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="flip-down">
            <img
              src="assets/diapositivas/diapo_08.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="zoom-in">
            <img
              src="assets/diapositivas/diapo_09.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="zoom-in-up">
            <img
              src="assets/diapositivas/diapo_10.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="zoom-in-down">
            <img
              src="assets/diapositivas/diapo_11.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
          <div data-aos="zoom-in-left">
            <img
              src="assets/diapositivas/diapo_12.png"
              class="img-fluid mb-5 rounded-3 border-pixel"
              alt=""
            />
          </div>
        </div>
      </section>

      <section id="formulario" class="py-5 text-center">
        <div class="glass-card d-inline-block p-4">
          <h2 class="h2 mb-3 jersey-font">Feedback</h2>
          <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSeiwhWhIZ5PtdCKMlRbi-aNjcDEM37YbiPfAU0oK4pG0mC53Q/viewform"
            target="_blank"
            class="form-link"
          >
            <img src="assets/form.webp" alt="Form" class="form-icon" />
            <p class="txt mt-2 jersey-font">Completar Formulario</p>
          </a>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 3000, // Bajamos a 800ms para que sea más ágil
        once: false, // Permitir repetir
        mirror: true, // Re-animar al subir
        anchorPlacement: 'top-bottom', // CLAVE: Define el trigger al entrar/salir
        offset: 180, // Reducimos el offset para que no tarde en salir
      });
    </script>
  </body>
</html>
